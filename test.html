<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; padding: 20px; }
        .shelfish-container { max-width: 800px; margin: 0 auto; }
        .shelfish-grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 0 1.5rem; /* Only horizontal gap, vertical is handled by row spans */
            grid-auto-rows: 1px; 
            align-items: start;
        }
        .shelfish-item-wrapper {
            grid-row-end: span var(--card-rows, 200);
            margin-bottom: 1.5rem; /* This is the uniform vertical displacement */
        }
        .shelfish-card {
            background: #333;
            border-radius: 12px;
            padding: 15px;
            border: 1px solid #444;
        }
        .thumb { background: #444; width: 100%; aspect-ratio: 2/3; border-radius: 4px; margin-bottom: 10px; }
        .btn { 
            background: #222; border: 1px solid #555; padding: 10px; border-radius: 6px; 
            margin-top: 0; /* Button sits right below card content */
            border-top: none; border-top-left-radius: 0; border-top-right-radius: 0;
        }
        .card-inner { border-bottom-left-radius: 0; border-bottom-right-radius: 0; }
    </style>
</head>
<body>
    <div class="shelfish-container">
        <div class="shelfish-grid" id="grid">
            <!-- Mock items -->
            <div class="shelfish-item-wrapper" id="item1">
                <div class="shelfish-card card-inner">
                    <div class="thumb"></div>
                    <strong>Me Talk Pretty One Day</strong><br>David Sedaris
                </div>
                <div class="btn">Get ePub →</div>
            </div>
            
            <div class="shelfish-item-wrapper" id="item2">
                <div class="shelfish-card">
                    <div class="thumb"></div>
                    <strong>How to Sharpen Pencils</strong><br>David Rees
                </div>
            </div>

            <div class="shelfish-item-wrapper" id="item3">
                <div class="shelfish-card">
                    <div class="thumb"></div>
                    <strong>Superstore</strong><br>Justin Spritz
                </div>
                <div class="btn">Couple goals! →</div>
            </div>

            <div class="shelfish-item-wrapper" id="item4">
                <div class="shelfish-card">
                    <div class="thumb"></div>
                    <strong>Dr. Strangelove</strong><br>Stanley Kubrick
                </div>
            </div>
        </div>
    </div>

    <script>
        function resizeGridItems() {
            const grid = document.getElementById('grid');
            const items = document.getElementsByClassName('shelfish-item-wrapper');
            for (let item of items) {
                const height = item.getBoundingClientRect().height;
                const rowSpan = Math.ceil(height);
                item.style.gridRowEnd = `span ${rowSpan}`;
            }
        }
        window.onload = resizeGridItems;
        window.onresize = resizeGridItems;
    </script>
</body>
</html>
